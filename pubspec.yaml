name: vs_executor
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  equatable: ^2.0.8
  file_picker: ^10.3.10
  flutter:
    sdk: flutter
  flutter_soloud: ^3.5.4
  google_fonts: ^8.0.2
  multi_audio_output:
    path: ../multi_audio_output
  path_provider: ^2.1.5
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/logo.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/icons/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/icons/
